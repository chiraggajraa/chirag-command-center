<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Alex — Document Q&A</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0e1a; font-family:sans-serif; color:#c8d8e8; height:100vh; display:flex; flex-direction:column; }
    header { background:#0f1628; border-bottom:1px solid #1e3a5f; padding:14px 24px; display:flex; align-items:center; gap:14px; }
    .icon { width:42px; height:42px; background:linear-gradient(135deg,#00d4ff,#0066ff); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
    header h1 { color:#00d4ff; font-size:17px; font-weight:800; }
    header p  { color:#4a6080; font-size:12px; }

    /* Source Panel */
    .source-panel { background:#0f1628; border-bottom:1px solid #1e3a5f; padding:14px 24px; display:flex; flex-direction:column; gap:10px; }
    .tabs { display:flex; gap:8px; }
    .tab { padding:8px 18px; border-radius:8px; border:1px solid #1e3a5f; background:transparent; color:#4a6080; cursor:pointer; font-size:13px; font-weight:600; }
    .tab.active { background:linear-gradient(135deg,#00d4ff,#0066ff); color:#000; border-color:transparent; }
    .source-row { display:flex; gap:10px; align-items:center; }
    .upload-btn { position:relative; overflow:hidden; }
    .upload-btn input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .upload-btn label { display:inline-block; padding:9px 18px; background:linear-gradient(135deg,#00d4ff,#0066ff); border-radius:8px; font-weight:700; color:#000; cursor:pointer; font-size:13px; }
    .url-input { flex:1; background:#071420; border:1px solid #1e3a5f; border-radius:8px; padding:9px 14px; color:#c8d8e8; font-size:13px; outline:none; }
    .url-input:focus { border-color:#00d4ff; }
    .load-btn { padding:9px 18px; background:linear-gradient(135deg,#00d4ff,#0066ff); border:none; border-radius:8px; color:#000; font-weight:700; cursor:pointer; font-size:13px; }
    #status { font-size:12px; }
    #status.ok  { color:#00ff9d; }
    #status.err { color:#ff4444; }
    #status.loading { color:#ffaa00; }
    .preview { font-size:11px; color:#4a6080; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:700px; }

    /* Chat */
    #chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
    #chat::-webkit-scrollbar { width:4px; }
    #chat::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
    .msg-alex { background:#071420; border:1px solid #1e3a5f; border-radius:12px; border-top-left-radius:3px; padding:14px 16px; max-width:85%; font-size:14px; line-height:1.7; }
    .msg-user { background:#0d2137; border:1px solid #1e3a5f; border-radius:12px; border-top-right-radius:3px; padding:14px 16px; max-width:85%; font-size:14px; }
    .wrap-alex { display:flex; flex-direction:column; align-self:flex-start; gap:3px; }
    .wrap-user { display:flex; flex-direction:column; align-self:flex-end; align-items:flex-end; gap:3px; }
    .lbl { font-size:11px; font-weight:700; }
    .lbl-alex { color:#00d4ff; }
    .lbl-user { color:#ff6b35; }
    .source-tag { display:inline-block; margin-top:8px; font-size:11px; color:#4a6080; background:#0a0e1a; border:1px solid #1e3a5f; border-radius:6px; padding:3px 8px; }
    .welcome { text-align:center; padding:40px; color:#4a6080; }
    .welcome h2 { color:#00d4ff; margin-bottom:8px; }
    strong { color:#00d4ff; }

    /* Input */
    .input-area { background:#0f1628; border-top:1px solid #1e3a5f; padding:14px 24px; display:flex; gap:10px; }
    input#inp { flex:1; background:#071420; border:1px solid #1e3a5f; border-radius:10px; padding:12px 16px; color:#c8d8e8; font-size:14px; outline:none; }
    input#inp:focus { border-color:#00d4ff; }
    .ask-btn { padding:12px 20px; background:linear-gradient(135deg,#00d4ff,#0066ff); border:none; border-radius:10px; color:#000; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>

<header>
  <div class="icon">📄</div>
  <div>
    <h1>ALEX — DOCUMENT Q&A</h1>
    <p>Upload a PDF or paste a web link — Alex reads it and answers your questions</p>
  </div>
</header>

<!-- Source Panel -->
<div class="source-panel">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('pdf')">📄 PDF Upload</button>
    <button class="tab" onclick="switchTab('url')">🌐 Web Link</button>
  </div>

  <div id="pdf-row" class="source-row">
    <div class="upload-btn">
      <input type="file" id="pdfFile" accept=".pdf" onchange="uploadPDF()"/>
      <label>📂 Choose PDF</label>
    </div>
    <div>
      <div id="status">No document loaded — upload a PDF or paste a URL</div>
      <div id="preview" class="preview"></div>
    </div>
  </div>

  <div id="url-row" class="source-row" style="display:none">
    <input class="url-input" id="urlInput" placeholder="https://docs.cimatron.com/..."/>
    <button class="load-btn" onclick="loadURL()">Load URL</button>
    <div>
      <div id="status2" style="font-size:12px;color:#4a6080"></div>
    </div>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div class="welcome">
    <h2>📄 Load a Document to Start</h2>
    <p>PDF Upload — any Cimatron manual, release notes, test plan</p>
    <p style="margin-top:6px">Web Link — any Cimatron docs page or knowledge base URL</p>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <input id="inp" placeholder="Ask a question from your document..." onkeydown="if(event.key==='Enter') askAlex()"/>
  <button class="ask-btn" onclick="askAlex()">Ask Alex ➤</button>
</div>

<script>
  const chat = document.getElementById('chat');

  // ── Tab Switch ────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('pdf-row').style.display = tab === 'pdf' ? 'flex' : 'none';
    document.getElementById('url-row').style.display = tab === 'url' ? 'flex' : 'none';
  }

  // ── Add Message ───────────────────────────────────────────────────
  function addMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = role === 'alex' ? 'wrap-alex' : 'wrap-user';
    if (role === 'alex') {
      wrap.innerHTML = `<div class="lbl lbl-alex">🔧 Alex</div>
        <div class="msg-alex" id="latest-alex">
          ${text}
          <div class="source-tag">📄 From document</div>
        </div>`;
    } else {
      wrap.innerHTML = `<div class="lbl lbl-user">You 👤</div>
        <div class="msg-user">${text}</div>`;
    }
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function formatText(t) {
    return t.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  }

  function setStatus(msg, cls) {
    const s = document.getElementById('status');
    s.textContent = msg; s.className = cls;
    document.getElementById('status2').textContent = msg;
  }

  // ── PDF Upload ────────────────────────────────────────────────────
  async function uploadPDF() {
    const file = document.getElementById('pdfFile').files[0];
    if (!file) return;
    setStatus('⏳ Reading PDF...', 'loading');
    const form = new FormData();
    form.append('pdf', file);
    try {
      const res = await fetch('/upload', { method:'POST', body: form });
      const data = await res.json();
      if (data.success) {
        setStatus('✅ Loaded: ' + file.name + ' (' + data.chars + ' chars)', 'ok');
        document.getElementById('preview').textContent = 'Preview: ' + data.preview + '...';
        chat.innerHTML = '';
        addMsg('alex', 'Document <strong>' + file.name + '</strong> loaded! Ask me anything from it.');
      } else {
        setStatus('❌ Failed: ' + (data.error || 'unknown'), 'err');
      }
    } catch(e) { setStatus('❌ Error reading PDF', 'err'); }
  }

  // ── URL Load ──────────────────────────────────────────────────────
  async function loadURL() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    setStatus('⏳ Fetching URL...', 'loading');
    try {
      const res = await fetch('/upload', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url: url})
      });
      const data = await res.json();
      if (data.success) {
        setStatus('✅ Loaded URL (' + data.chars + ' chars)', 'ok');
        document.getElementById('preview').textContent = 'Preview: ' + data.preview + '...';
        chat.innerHTML = '';
        addMsg('alex', 'Web page loaded! Ask me anything from it.');
      } else {
        setStatus('❌ Failed: ' + (data.error || 'unknown'), 'err');
      }
    } catch(e) { setStatus('❌ Error fetching URL', 'err'); }
  }

  // ── Ask Alex ──────────────────────────────────────────────────────
  async function askAlex() {
    const q = document.getElementById('inp').value.trim();
    if (!q) return;
    document.getElementById('inp').value = '';
    addMsg('user', q);
    const wrap = addMsg('alex', '<em style="color:#4a6080">Reading document...</em>');
    const bubble = wrap.querySelector('.msg-alex');

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q})
      });
      const data = await res.json();
      bubble.innerHTML = formatText(data.answer) + '<div class="source-tag">📄 From document</div>';
    } catch(e) {
      bubble.innerHTML = '⚠ Error — check terminal';
    }
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
